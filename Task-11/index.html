<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" >
<link rel="stylesheet" href="style.css" />
<title>Task-11</title>
</head>

<body>
<video autoplay muted loop id="video"  >
  <source src="video.mp4" >
</video>
<div class="tab" >
    <h1 class="title">
        Smart login system
    </h1>
    <form class="form">
        <input type="text" id="name" class="label" placeholder="Enter your name" style="display:none;">
        <input type="email" class="label" id="email" placeholder="Enter your email" required>
        <input type="password" class="label" id="password" placeholder="Enter your password" required minlength="8"
          pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&]).+">
        <p id="message" style="color:rgb(236, 0, 0); display:none;"></p>
    </form>
    <button type="button" class="button" id="login">
        Log in
    </button>
    <h3 class="text">
      You have an account? <a href="#" id="signup">SignUp</a>
    </h3>
</div>
<script src="script.js"></script>
</body>
